services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    network_mode: host
    ports:
      - "0.0.0.0:8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/yomitori.db
      - YOMITORI_CRAWLER_ENABLED=true
      - YOMITORI_CRAWLER_SCHEDULE=0 */1 * * * ?
      - YOMITORI_CRAWLER_BOOKS_PATH=${BOOKS_PATH:-/app/data/books}
      - YOMITORI_CRAWLER_COVERS_PATH=/app/data/covers
      - YOMITORI_DICTIONARIES_PATH=/app/data/dictionaries
      - SERVER_ADDRESS=0.0.0.0
      - YOMITORI_CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      - ANKI_CONNECT_URL=${ANKI_CONNECT_URL:-http://localhost:8765}
    volumes:
      - ${BOOKS_MOUNT:-./.books}:/app/data/books:ro
      - ${DICTIONARIES_MOUNT:-./dictionaries}:/app/data/dictionaries:ro
      - yomitori-data:/app/data

  middleware:
    build:
      context: middleware
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - NODE_ENV=production
      - PORT=3000
      - BACKEND_URL=http://localhost:8080
      - ANKI_DECK_NAME=${ANKI_DECK_NAME:-自動}
      - DEINFLECT_RULES_PATH=/app/deinflect-rules.json
    volumes:
      - ./middleware/deinflect-rules.json:/app/deinflect-rules.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      # Use Dockerfile.prod for serving pre-built dist/ (run ./build.sh first)
      # dockerfile: Dockerfile.prod
    ports:
      - "0.0.0.0:5173:5173"
    environment:
      - DOCKER_ENV=true
      - LAN_IP=${LAN_IP:-localhost}
      - VITE_BACKEND_URL=http://localhost:8080
      - VITE_MIDDLEWARE_URL=http://localhost:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/index.html:/app/index.html
      - ./frontend/reader.html:/app/reader.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
    depends_on:
      - backend
      - middleware
    networks:
      - yomitori-network

  file-server:
    image: python:3.11-slim
    working_dir: /books
    command: python -m http.server 8888
    volumes:
      - ${BOOKS_MOUNT:-./.books}:/books:ro
    ports:
      - "8888:8888"
    networks:
      - yomitori-network

networks:
  yomitori-network:
    driver: bridge

volumes:
  yomitori-data:
