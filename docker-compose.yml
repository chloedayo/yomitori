version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: "1"
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:sqlite:/app/data/yomitori.db
      - YOMITORI_CRAWLER_ENABLED=true
      - YOMITORI_CRAWLER_SCHEDULE=0 */1 * * * ?
      - YOMITORI_CRAWLER_BOOKS_PATH=${BOOKS_PATH:-/app/data/books}
      - YOMITORI_CRAWLER_COVERS_PATH=/app/data/covers
    volumes:
      - ${BOOKS_MOUNT:-./.books}:/app/data/books:ro
      - yomitori-data:/app/data
    networks:
      - yomitori-network

  frontend:
    build:
      context: frontend
      dockerfile: Dockerfile
      # Use Dockerfile.prod for serving pre-built dist/ (run ./build.sh first)
      # dockerfile: Dockerfile.prod
    ports:
      - "5173:5173"
    environment:
      - DOCKER_ENV=true
    depends_on:
      - backend
    networks:
      - yomitori-network

  file-server:
    image: python:3.11-slim
    working_dir: /books
    command: python -m http.server 8888
    volumes:
      - ${BOOKS_MOUNT:-./.books}:/books:ro
    ports:
      - "8888:8888"
    networks:
      - yomitori-network

networks:
  yomitori-network:
    driver: bridge

volumes:
  yomitori-data:
