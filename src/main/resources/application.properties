spring.application.name=yomitori
server.port=8080

# SQLite Configuration
spring.datasource.url=jdbc:sqlite:${DATA_DIR:/app/data}/yomitori.db?mode=rwc&journal_mode=WAL&timeout=30000
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.show_sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway migrations
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=false

# Crawler configuration
yomitori.crawler.books-path=${BOOKS_PATH:${DATA_DIR:/app/data}/books}
yomitori.crawler.covers-path=${DATA_DIR:/app/data}/covers
yomitori.crawler.batch-size=100

# Dictionary configuration
yomitori.dictionaries.path=${DATA_DIR:/app/data}/dictionaries

# Static file serving for books (backend serves EPUBs via /api/books/{id}/file)
spring.web.resources.static-locations=file:${BOOKS_PATH:${DATA_DIR:/app/data}/books}

# CORS configuration — allow Tauri WebView origins
yomitori.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://localhost:3000,tauri://localhost,http://tauri.localhost}

# Logging
logging.level.com.yomitori=DEBUG
logging.level.org.springframework.web=WARN
logging.level.org.flyway=INFO
logging.level.org.hibernate=OFF
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql=OFF
