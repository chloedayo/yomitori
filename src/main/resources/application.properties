spring.application.name=yomitori
server.port=8080

# SQLite Configuration
spring.datasource.url=jdbc:sqlite:/app/yomitori.db
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
# SQLite doesn't support generated keys retrieval
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=false

# Flyway migrations
spring.flyway.locations=classpath:db/migration
spring.flyway.enabled=true

# Crawler configuration
yomitori.crawler.enabled=true
yomitori.crawler.schedule=0 0 * * * ?
yomitori.crawler.books-path=/run/media/stella/stella-drive/books
yomitori.crawler.covers-path=/app/covers
yomitori.crawler.batch-size=100

# Logging
logging.level.com.yomitori=INFO
logging.level.org.springframework.web=WARN
