name: CI

# Expected required checks on feat/middleware-pivot (configure in GitHub
# branch protection UI, out of scope for this workflow file):
#   - Backend tests
#   - Frontend tests
#   - Middleware build
#   - Tauri type check
# TODO(china): in P4, add Security audit as a required check.
# TODO(ume):   in P4, add E2E smoke as a required check.

on:
  push:
    branches: [master, main, "feat/**"]
  pull_request:
    branches: [master, main, "feat/**"]

jobs:
  # TODO: Tauri type-check gate before backend job
  backend:
    name: Backend tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      # Covers Kotlin unit + integration tests (integration hits real SQLite
      # per project standards — no mocking of persistence layer).
      - name: Run tests
        run: ./gradlew test --no-daemon -Dorg.gradle.jvmargs="-Xmx768m -XX:+UseSerialGC"

      # TODO(china): wire OWASP dependency-check in P4.
      # - name: OWASP dependency-check
      #   run: ./gradlew dependencyCheckAnalyze --no-daemon

  frontend:
    name: Frontend tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      # Type-check gate: fails fast on TS errors without producing bundle output.
      - name: Type check
        working-directory: frontend
        run: npm run type-check

      # TODO(china/p4): `npm run lint` script not yet defined in frontend/package.json.
      # Add eslint config + script, then enable this step.
      # - name: Lint
      #   working-directory: frontend
      #   run: npm run lint

      # Unit tests (vitest).
      - name: Unit tests
        working-directory: frontend
        run: npm run test

      # Build gate: ensures production bundle compiles (tsc + vite build).
      # Removed VITE_MIDDLEWARE_URL / VITE_BACKEND_URL env in middleware-pivot:
      # frontend is now always same-origin (middleware serves the bundle), so
      # no build-time URL injection is needed.
      - name: Build
        working-directory: frontend
        run: npm run build

      # TODO(china): wire `npm audit --audit-level=high` in P4.
      # - name: npm audit
      #   working-directory: frontend
      #   run: npm audit --audit-level=high

  middleware:
    name: Middleware build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: middleware/package-lock.json

      - name: Install dependencies
        working-directory: middleware
        run: npm ci --legacy-peer-deps

      # `npm run build` is `tsc` — doubles as type-check since there is no
      # separate `type-check` script. If a dedicated noEmit script is added
      # later, swap to `tsc --noEmit` for faster feedback.
      - name: Build (tsc compile check)
        working-directory: middleware
        run: npm run build

      # TODO(sumika/temari): middleware has no unit tests yet. Add vitest/jest
      # suite for tokenize/deinflect/mine-words and wire `npm run test` here.
      # - name: Unit tests
      #   working-directory: middleware
      #   run: npm run test

      # TODO(china): wire `npm audit --audit-level=high` in P4.
      # - name: npm audit
      #   working-directory: middleware
      #   run: npm audit --audit-level=high

  # TODO(ume): wire end-to-end smoke test in P4.
  # Should boot backend + middleware sidecars, curl /health, exercise a
  # minimal read-flow. Runs after all gates above succeed.
  # e2e-smoke:
