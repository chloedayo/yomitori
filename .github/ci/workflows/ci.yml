name: CI

on:
  push:
    branches: [master, main, "feat/**"]
  pull_request:
    branches: [master, main]

jobs:    
  backend:                                                                                                                                             
    name: Backend tests                                   
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4                                                                                                                    
        with:
          distribution: temurin                                                                                                                        
          java-version: "21"                              
      - uses: gradle/actions/setup-gradle@v4
        - name: Run tests                                                                                                                                
          run: ./gradlew test --no-daemon -Dorg.gradle.jvmargs="-Xmx768m -XX:+UseSerialGC"



  frontend:
    name: Frontend tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npm run type-check 2>/dev/null || npx tsc --noEmit

      - name: Unit tests
        working-directory: frontend
        run: npm test

  launcher-check:
    name: Tauri type check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: launcher

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev patchelf

      - name: Create placeholder artifacts
        run: |
          mkdir -p launcher/binaries launcher/resources/jre
          touch launcher/binaries/yomitori-backend-x86_64-unknown-linux-gnu
          touch launcher/binaries/yomitori-middleware-x86_64-unknown-linux-gnu
          touch launcher/resources/yomitori.jar
          chmod +x launcher/binaries/*

      - name: cargo check
        working-directory: launcher
        run: cargo check
